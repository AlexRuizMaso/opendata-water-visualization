name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        # Use npm install to be resilient when package-lock.json is not present
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Prepare dist for deployment
        run: |
          # Copy build output to a clean directory for deployment
          rm -rf out || true
          mkdir out
          cp -R frontend/dist/* out/

      - name: Deploy to gh-pages branch
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add -A
          git commit -m "ci: deploy frontend ${GITHUB_SHA}"
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git
          # Force push to gh-pages (this will overwrite that branch)
          git push --force origin gh-pages:gh-pages
